<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- deep-space window fill (nebula bg) -->
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101c3e"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <!-- iris-nebula glow inside the terminal -->
    <radialGradient id="neb" cx="50%" cy="64%" r="62%">
      <stop offset="0%" stop-color="#6ad7ff" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#4d8dff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#4d8dff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- horizontal terminal window (wider than tall, like a terminal frame) -->
  <rect x="72" y="252" width="880" height="520" rx="58" fill="url(#win)"/>
  <rect x="72" y="252" width="880" height="520" rx="58" fill="url(#neb)"/>
  <rect x="75" y="255" width="874" height="514" rx="55" fill="none"
        stroke="#4d8dff" stroke-opacity="0.55" stroke-width="6"/>

  <!-- title bar: separator + three nebula-coloured dots -->
  <line x1="72" y1="348" x2="952" y2="348" stroke="#16203a" stroke-width="4"/>
  <circle cx="150" cy="300" r="15" fill="#6ad7ff"/>
  <circle cx="198" cy="300" r="15" fill="#4d8dff"/>
  <circle cx="246" cy="300" r="15" fill="#8aa0ff"/>

  <!-- prompt:  >_ -->
  <polyline points="318,456 452,562 318,668" fill="none" stroke="#6ad7ff"
            stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="516" y="628" width="226" height="42" rx="16" fill="#6ad7ff"/>
</svg>
